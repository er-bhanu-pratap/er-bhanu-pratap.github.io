<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Live Chat — Bhanu Pratap</title>
    <meta content="Bhanu Pratap" name="description">
    <noscript>Sorry, your browser does not support JavaScript!</noscript>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: {
          colors: { accent:'#6c63ff', accent2:'#ff6584', accent3:'#43e97b', dark:'#07071a', dark2:'#0d0d2b' },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'], mono: ['Fira Code','monospace'] }
        }}
      }
    </script>

    <!-- Portfolio modern CSS (shared) -->
    <link href="/assets/css/modern.css" rel="stylesheet">

    <style>
      /* ---- Chat-specific styles ---- */
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
      body { background: var(--bg); }

      /* ---- Login Screen ---- */
      #login {
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(108,99,255,.2) 0%, transparent 70%);
      }
      .login-card {
        width: 100%; max-width: 420px;
        padding: 48px 40px; border-radius: 24px;
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.09);
        backdrop-filter: blur(20px);
        text-align: center;
        animation: fadeUp .6s ease both;
      }
      @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:none} }
      .login-avatar {
        width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px;
        background: linear-gradient(135deg,var(--accent),var(--accent-2));
        display: flex; align-items: center; justify-content: center;
        font-size: 2rem; color: #fff;
        box-shadow: 0 8px 32px rgba(108,99,255,.35);
      }
      .login-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
      .login-sub   { font-size: .88rem; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
      .google-btn  {
        width: 100%; padding: 14px 24px; border-radius: 50px; border: none;
        background: #fff; color: #333; font-size: .95rem; font-weight: 700;
        display: flex; align-items: center; justify-content: center; gap: 12px;
        cursor: pointer; transition: box-shadow .25s, transform .25s;
        box-shadow: 0 4px 18px rgba(0,0,0,.18);
      }
      .google-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.28); }
      .google-btn img { width: 22px; height: 22px; }
      .login-error {
        margin-top: 16px; padding: 12px 16px; border-radius: 10px;
        background: rgba(255,101,132,.12); border: 1px solid rgba(255,101,132,.25);
        color: var(--accent-2); font-size: .83rem; display: none;
      }

      /* ---- Chat Layout ---- */
      #chat { display: none; min-height: 100vh; padding: 80px 0 0; }
      .chat-wrap {
        display: flex; height: calc(100vh - 80px);
        width: 100%; max-width: 1100px; margin: 0 auto;
        border-radius: 20px 20px 0 0; overflow: hidden;
        border: 1px solid rgba(255,255,255,.08); border-bottom: none;
        background: rgba(255,255,255,.03);
        backdrop-filter: blur(16px);
      }
      #login,
      #chat,
      .login-card,
      .chat-wrap,
      .chat-sidebar,
      .chat-main,
      .send-box input,
      .user-info,
      .chat-main-head > div {
        min-width: 0;
      }

      /* Sidebar */
      .chat-sidebar {
        width: 300px; flex-shrink: 0;
        border-right: 1px solid rgba(255,255,255,.07);
        display: flex; flex-direction: column;
      }
      .sidebar-head {
        padding: 20px 18px 14px;
        border-bottom: 1px solid rgba(255,255,255,.07);
        display: flex; align-items: center; justify-content: space-between;
      }
      .sidebar-head .title { font-size: 1.05rem; font-weight: 700; }
      .sidebar-head .sign-out-btn {
        padding: 6px 14px; border-radius: 50px; font-size: .75rem; font-weight: 600;
        background: rgba(255,101,132,.12); color: var(--accent-2);
        border: 1px solid rgba(255,101,132,.2); cursor: pointer;
        transition: background .2s, border-color .2s;
      }
      .sidebar-head .sign-out-btn:hover { background: rgba(255,101,132,.22); border-color: var(--accent-2); }
      .search-wrap {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255,255,255,.07);
      }
      .search-wrap input {
        width: 100%; padding: 9px 14px; border-radius: 50px;
        background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.09);
        color: var(--text); font-size: .85rem; outline: none;
        transition: border-color .2s;
      }
      .search-wrap input::placeholder { color: var(--muted); }
      .search-wrap input:focus { border-color: var(--accent); }
      .users-list { flex: 1; overflow-y: auto; padding: 8px 0; }
      .users-list::-webkit-scrollbar { width: 4px; }
      .users-list::-webkit-scrollbar-thumb { background: rgba(108,99,255,.3); border-radius: 2px; }

      .user-item {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 18px; cursor: pointer;
        transition: background .2s;
        text-decoration: none; color: inherit;
      }
      .user-item:hover, .user-item.active { background: rgba(108,99,255,.1); }
      .user-avatar {
        width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
        flex-shrink: 0; border: 2px solid rgba(108,99,255,.2);
      }
      .user-info h4 { font-size: .9rem; font-weight: 600; margin-bottom: 2px; }
      .user-info p  { font-size: .75rem; color: var(--muted); }
      .user-info h4,
      .user-info p,
      .conv-name,
      .conv-bio {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .user-dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: var(--accent-3); margin-left: auto; flex-shrink: 0;
      }

      /* Skeleton loaders */
      .skel { background: rgba(255,255,255,.07); border-radius: 6px; animation: shimmer 1.4s infinite; }
      @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.8} }
      .skel-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; }
      .skel-line-sm { height: 10px; width: 110px; }
      .skel-line-xs { height: 8px; width: 75px; margin-top: 6px; }

      /* Message area */
      .chat-main {
        flex: 1; display: flex; flex-direction: column; min-width: 0;
      }
      .chat-main-head {
        padding: 16px 24px;
        border-bottom: 1px solid rgba(255,255,255,.07);
        display: flex; align-items: center; gap: 14px;
        flex-shrink: 0;
      }
      .chat-main-head .back-btn {
        display: none; width: 34px; height: 34px; border-radius: 50%;
        background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.09);
        align-items: center; justify-content: center; cursor: pointer; font-size: 1rem;
      }
      .chat-main-head .conv-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
      .chat-main-head .conv-name { font-size: .97rem; font-weight: 700; }
      .chat-main-head .conv-bio  { font-size: .75rem; color: var(--muted); }

      .messages-area {
        flex: 1; overflow-y: auto; padding: 24px 24px 16px;
        display: flex; flex-direction: column; gap: 4px;
      }
      .messages-area::-webkit-scrollbar { width: 4px; }
      .messages-area::-webkit-scrollbar-thumb { background: rgba(108,99,255,.3); border-radius:2px; }

      .msg-bubble { max-width: 72%; }
      .msg-bubble p {
        padding: 11px 16px; border-radius: 18px; font-size: .9rem; line-height: 1.5;
        display: inline-block; word-break: break-word;
      }
      .msg-bubble .msg-time { font-size: .7rem; color: var(--muted); margin-top: 4px; padding: 0 4px; }

      .msg-bubble.sent  { align-self: flex-end; text-align: right; }
      .msg-bubble.sent  p { background: linear-gradient(135deg,var(--accent),var(--accent-2)); color: #fff; border-bottom-right-radius: 4px; }
      .msg-bubble.recv  { align-self: flex-start; }
      .msg-bubble.recv  p { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.08); border-bottom-left-radius: 4px; }

      .msg-divider {
        display: flex; align-items: center; gap: 12px; margin: 12px 0;
        font-size: .73rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
      }
      .msg-divider::before, .msg-divider::after {
        content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.07);
      }

      .chat-empty {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 12px; color: var(--muted); font-size: .9rem;
      }
      .chat-empty i { font-size: 3rem; opacity: .3; }

      /* Input */
      .send-box {
        padding: 16px 24px;
        border-top: 1px solid rgba(255,255,255,.07);
        display: flex; gap: 12px; align-items: center;
        flex-shrink: 0;
      }
      .send-box input {
        flex: 1; padding: 12px 18px; border-radius: 50px;
        background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.09);
        color: var(--text); font-size: .9rem; outline: none; font-family: inherit;
        transition: border-color .2s, box-shadow .2s;
      }
      .send-box input::placeholder { color: var(--muted); }
      .send-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.12); }
      .send-btn {
        width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
        background: linear-gradient(135deg,var(--accent),var(--accent-2));
        color: #fff; font-size: 1rem; display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; transition: transform .2s, box-shadow .2s;
      }
      .send-btn:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(108,99,255,.45); }
      .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

      /* Mobile responsive */
      @media (max-width: 640px) {
        .chat-sidebar { width: 100%; position: absolute; inset: 0; z-index: 10; background: var(--bg2); transition: transform .3s; }
        .chat-sidebar.hidden { transform: translateX(-100%); }
        .chat-main-head .back-btn { display: flex; }
        .chat-wrap { position: relative; border-radius: 0; height: calc(100dvh - 60px); }
        #chat { min-height: 100dvh; padding-top: 60px; }
      }
    </style>
</head>

<body>

  <!-- Minimal top nav bar -->
  <nav id="navbar" class="scrolled" style="border-bottom:1px solid rgba(255,255,255,.07);">
    <a href="/" class="nav-logo">Bhanu Pratap</a>
    <div class="nav-links">
      <a href="/#about">About</a>
      <a href="/#projects">Projects</a>
      <a href="/#contact">Contact</a>
      <a href="/chat" class="active">Chat</a>
    </div>
    <a href="/" class="nav-cta"><i class="bi bi-arrow-left"></i> Back</a>
  </nav>

  <!-- ==================== LOGIN ==================== -->
  <section id="login">
    <div class="login-card">
      <div class="login-avatar"><i class="bi bi-chat-dots-fill"></i></div>
      <div class="login-title">Live Chat</div>
      <p class="login-sub">Sign in with Google to start chatting with me.<br>Your conversation is private and secure.</p>
      <button class="google-btn" id="sign-in-button">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Sign in with Google
      </button>
      <div class="login-error" id="login-error"></div>
    </div>
  </section>

  <!-- ==================== CHAT ==================== -->
  <section id="chat">
    <div class="chat-wrap mx-4 lg:mx-auto">

      <!-- Sidebar -->
      <div class="chat-sidebar" id="chat-sidebar">
        <div class="sidebar-head">
          <span class="title"><i class="bi bi-chat-dots" style="color:var(--accent);margin-right:8px;"></i>Messages</span>
          <button class="sign-out-btn" id="sign-out">Sign Out</button>
        </div>
        <div class="search-wrap">
          <input type="text" id="user-search" placeholder="Search users…">
        </div>
        <div class="users-list" id="usersList">
          <!-- Skeleton loaders -->
          <div class="user-item" id="skel-loader">
            <div class="skel skel-avatar"></div>
            <div><div class="skel skel-line-sm"></div><div class="skel skel-line-xs"></div></div>
          </div>
          <div class="user-item">
            <div class="skel skel-avatar"></div>
            <div><div class="skel skel-line-sm"></div><div class="skel skel-line-xs"></div></div>
          </div>
          <div class="user-item">
            <div class="skel skel-avatar"></div>
            <div><div class="skel skel-line-sm"></div><div class="skel skel-line-xs"></div></div>
          </div>
        </div>
      </div>

      <!-- Main chat panel -->
      <div class="chat-main">
        <!-- Header -->
        <div class="chat-main-head" id="chat-main-head">
          <button class="back-btn" id="back-btn" onclick="showSidebar()">
            <i class="bi bi-arrow-left"></i>
          </button>
          <img class="conv-avatar conversation-thumbnail" src="https://placehold.co/42x42/6c63ff/white?text=?" alt="">
          <div>
            <div class="conv-name conversation-name">Select a user</div>
            <div class="conv-bio conversation-bio" style="color:var(--muted);font-size:.75rem;">Choose someone from the list</div>
          </div>
        </div>

        <!-- Messages -->
        <div class="messages-area" id="msg-body">
          <div class="chat-empty" id="chat-empty">
            <i class="bi bi-chat-square-dots"></i>
            <span>Select a conversation to start chatting</span>
          </div>
        </div>

        <!-- Send box -->
        <div class="send-box">
          <input type="text" class="message-text-input" id="msg-input" placeholder="Type a message…" data-uid="null" autocomplete="off">
          <button class="send-btn send-text-message" id="send-btn" disabled title="Send">
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
      </div>

    </div>
  </section>

  <!-- jQuery (needed by main.js) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Firebase chat logic -->
  <script src="/chat/main.js" type="module"></script>

  <script>
    /* Mobile: show sidebar, hide chat panel */
    function showSidebar() {
      document.getElementById('chat-sidebar').classList.remove('hidden');
    }
    /* Mobile: hide sidebar when user is selected */
    function hideSidebar() {
      if (window.innerWidth <= 640) {
        document.getElementById('chat-sidebar').classList.add('hidden');
      }
    }
    /* Enable send btn when input has text */
    document.addEventListener('DOMContentLoaded', () => {
      const inp = document.getElementById('msg-input');
      const btn = document.getElementById('send-btn');
      if (inp && btn) {
        inp.addEventListener('input', () => {
          btn.disabled = inp.value.trim() === '' || inp.dataset.uid === 'null';
        });
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !btn.disabled) btn.click();
        });
      }
    });
  </script>

</body>
</html>
